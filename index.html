<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>The Members Lounge | Ultimate Event Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700&family=Roboto:wght@400&display=swap" rel="stylesheet">
  <style>
    /* (same styles as before, unchanged) */
    :root{
      --bg:#ffffff;
      --text:#0b0c10;
      --muted:#4b5563;
      --line:rgba(0,0,0,.10);
      --gold:#b08d2a;
      --goldSoft:rgba(176,141,42,.10);
      --shadow:0 2px 10px rgba(0,0,0,.1);
      --radius:8px;
      --ok:#0f7a3a;
      --warn:#b45309;
      --bad:#b91c1c;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:'Roboto', sans-serif;
      background:var(--bg);
      color:var(--text);
    }
    header{
      padding:20px;
      text-align:center;
      border-bottom:1px solid var(--line);
      background:#fff;
      box-shadow:var(--shadow);
    }
    .brandline{display:flex; align-items:center; justify-content:center; gap:12px; flex-wrap:wrap;}
    .logoWrap{
      display:flex; align-items:center; justify-content:center;
      padding:10px 14px;
      border:1px solid var(--line);
      border-radius:50%;
      background:#fff;
      box-shadow:var(--shadow);
      gap:10px;
    }
    .logoImg{max-height:80px; width:auto; display:block;}
    .logoFallback{
      display:inline-flex; align-items:center; gap:10px;
      font-weight:700; letter-spacing:.1em; font-size:14px;
    }

    h1{margin:12px 0 6px; font-size:28px; font-family:'Montserrat', sans-serif;}
    .sub{color:var(--muted); font-size:14px}
    .gold{color:var(--gold)}
    main{max-width:1200px; margin:0 auto; padding:20px;}

    /* progress indicator */
    .progress-steps {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin: 10px 0 5px;
      font-size: 13px;
      color: var(--muted);
    }
    .step {
      display: flex;
      flex-direction: column;
      align
