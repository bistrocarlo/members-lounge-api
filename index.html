<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>The Members Lounge | Wedding Signature Series</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:#ffffff;
color:#111;
}

header{
padding:20px;
border-bottom:1px solid #ddd;
display:flex;
align-items:center;
gap:15px;
}

header img{
height:55px;
}

h1{
font-size:20px;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

.section{
margin-bottom:40px;
}

.section h2{
border-bottom:1px solid #ddd;
padding-bottom:6px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.option{
border:1px solid #ddd;
padding:10px;
border-radius:6px;
}

.hot{
color:#b00000;
font-weight:bold;
font-size:12px;
}

button{
background:#b08d2a;
color:white;
border:none;
padding:12px 20px;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

input,select{
padding:10px;
border:1px solid #ccc;
border-radius:6px;
width:100%;
}

.summary{
background:#f7f7f7;
padding:20px;
border-radius:6px;
}

@media print{

body *{
visibility:hidden;
}

#printSummary, #printSummary *{
visibility:visible;
}

#printSummary{
position:absolute;
top:0;
left:0;
width:100%;
padding:40px;
}

}

</style>
</head>

<body>

<header>

<img src="MembersLoungeLogo.png">

<h1>Members Lounge Wedding Signature Series</h1>

</header>

<div class="container">

<div class="section">

<h2>Couple Details</h2>

<div class="grid">

<div>
<label>Bride</label>
<input id="bride">
</div>

<div>
<label>Groom</label>
<input id="groom">
</div>

<div>
<label>Wedding Date</label>
<input type="date" id="date">
</div>

<div>
<label>Venue</label>
<select id="venue">
<option>The Members Lounge</option>
<option>Sala Reggio Ballroom</option>
<option>Fior Parkville</option>
</select>
</div>

</div>

</div>


<div class="section">

<h2>Canapés (Choose 3)</h2>

<div class="grid">

<label class="option"><input type="checkbox" name="canapes" value="Arancini"> Arancini</label>
<label class="option"><input type="checkbox" name="canapes" value="Meatballs"> Meatballs</label>
<label class="option"><input type="checkbox" name="canapes" value="Prawn Wraps"> Prawn Wraps</label>
<label class="option"><input type="checkbox" name="canapes" value="Parmesan Honey"> Parmesan with Honey</label>
<label class="option"><input type="checkbox" name="canapes" value="Caprese Bites"> Caprese Bites</label>
<label class="option"><input type="checkbox" name="canapes" value="Croquettes"> Croquettes</label>

</div>

</div>


<div class="section">

<h2>Antipasto (Choose 7 — Max 2 Hot)</h2>

<div class="grid">

<label class="option">
<input type="checkbox" name="antipasto" data-hot="1" value="Calamari">
Calamari <span class="hot">HOT</span>
</label>

<label class="option">
<input type="checkbox" name="antipasto" data-hot="1" value="Cevapi">
Cevapi <span class="hot">HOT</span>
</label>

<label class="option">
<input type="checkbox" name="antipasto" data-hot="1" value="Sausages">
Sausages <span class="hot">HOT</span>
</label>

<label class="option"><input type="checkbox" name="antipasto" value="Tiropita"> Tiropita</label>
<label class="option"><input type="checkbox" name="antipasto" value="Feta"> Feta</label>
<label class="option"><input type="checkbox" name="antipasto" value="Kefalograviera"> Kefalograviera</label>
<label class="option"><input type="checkbox" name="antipasto" value="Trio of dips"> Trio of dips</label>
<label class="option"><input type="checkbox" name="antipasto" value="Prosciutto"> Prosciutto</label>
<label class="option"><input type="checkbox" name="antipasto" value="Salami"> Salami</label>
<label class="option"><input type="checkbox" name="antipasto" value="Olives"> Olives</label>
<label class="option"><input type="checkbox" name="antipasto" value="Grilled Vegetables"> Grilled Vegetables</label>
<label class="option"><input type="checkbox" name="antipasto" value="Caprese"> Caprese</label>

</div>

</div>


<div class="section">

<h2>Main Courses (Choose 2)</h2>

<div class="grid">

<label class="option"><input type="checkbox" name="mains" value="Chicken Chimichurri"> Chicken Chimichurri</label>
<label class="option"><input type="checkbox" name="mains" value="Barramundi"> Italian Crumbed Barramundi</label>
<label class="option"><input type="checkbox" name="mains" value="Lamb Shank"> Lamb Shank</label>
<label class="option"><input type="checkbox" name="mains" value="Beef Short Ribs"> Braised Beef Short Ribs</label>
<label class="option"><input type="checkbox" name="mains" value="Bondiola"> Pork Bondiola</label>
<label class="option"><input type="checkbox" name="mains" value="Stuffed Pepper"> Stuffed Pepper</label>

</div>

</div>


<div class="section">

<h2>Quote</h2>

<div class="grid">

<div>
<label>Adults</label>
<input id="adults" type="number" value="0">
</div>

<div>
<label>Children</label>
<input id="children" type="number" value="0">
</div>

<div>
<label>Food per head</label>
<input id="foodprice" type="number" value="0">
</div>

<div>
<label>Drinks per head</label>
<input id="drinkprice" type="number" value="0">
</div>

</div>

</div>


<div class="section summary">

<h2>Summary</h2>

<p id="summary"></p>

<button onclick="printSummary()">Print Wedding Summary</button>

</div>

</div>


<div id="printSummary" style="display:none">

<h1>The Members Lounge</h1>

<h2>Wedding Event Summary</h2>

<p id="printContent"></p>

</div>


<script>

function getChecked(name){

let arr=[]

document.querySelectorAll("input[name='"+name+"']:checked")
.forEach(el=>arr.push(el.value))

return arr

}


function antipastoSplit(){

let hot=[]
let cold=[]

document.querySelectorAll("input[name='antipasto']:checked")
.forEach(el=>{

if(el.dataset.hot=="1") hot.push(el.value)
else cold.push(el.value)

})

return {hot,cold}

}


function printSummary(){

let bride=document.getElementById("bride").value
let groom=document.getElementById("groom").value
let date=document.getElementById("date").value
let venue=document.getElementById("venue").value

let canapes=getChecked("canapes")

let mains=getChecked("mains")

let antipasto=antipastoSplit()

let text=`

Couple: ${bride} & ${groom}

Date: ${date}

Venue: ${venue}

Canapés
${canapes.join(", ")}

Antipasto
HOT: ${antipasto.hot.join(", ")}
NON HOT: ${antipasto.cold.join(", ")}

Main Courses
${mains.join(", ")}

Supper
Pizza service

`

document.getElementById("printContent").innerText=text

document.getElementById("printSummary").style.display="block"

window.print()

}

</script>

</body>
</html>
